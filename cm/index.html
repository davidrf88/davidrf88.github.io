<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Wedding</title>
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"
		/>
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Imperial+Script&family=Playfair+Display:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<script src="https://cdn.tailwindcss.com"></script>
		<style>
			:root {
				--soft-gray: #353b2a;
			}

			@keyframes fadeInSlow {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}

			.fade-in-5s {
				animation: fadeInSlow 5s ease-in-out forwards;
			}

			.fade-in-title {
				opacity: 0;
				animation: fadeInSlow 3s ease-in-out forwards;
				animation-delay: 1s;
			}

			.fade-in-name {
				opacity: 0;
				animation: fadeInSlow 3s ease-in-out forwards;
				animation-delay: 1s;
			}

			.fade-in-date {
				opacity: 0;
				animation: fadeInSlow 3s ease-in-out forwards;
				animation-delay: 1s;
				font-family: "Playfair Display", serif;
			}

			.font-imperial {
				font-family: "Imperial Script", cursive;
			}

			.font-formal {
				font-family: "Playfair Display", serif;
			}

			.bg-soft-gray {
				background-color: var(--soft-gray);
			}

			.fade-to-soft-gray {
				background: linear-gradient(to bottom, transparent, var(--soft-gray));
			}

			.letters {
				position: absolute;
				top: 20%;
				left: 50%;
				transform: translate(-50%, -50%);
				width: 90%;
			}
		</style>
	</head>
	<body class="bg-black min-h-screen overflow-x-hidden">
		<main class="relative w-screen h-[100svh] overflow-hidden">
			<img
				src="images/spalshy.jpg"
				alt="Wedding splash"
				class="block w-screen h-[110svh] object-cover lg:object-center fade-in-5s"
			/>
			<div class="absolute inset-0 bg-black/40"></div>
			<div class="pointer-events-none absolute bottom-0 left-0 h-12 w-full"></div>
			<div class="letters text-center text-white fade-in-title">
				<p class="text-lg sm:text-xl md:text-2xl lg:text-3xl tracking-[0.2em] uppercase font-formal">
					Save <span class="font-imperial normal-case tracking-normal text-2xl sm:text-3xl md:text-4xl lg:text-4xl">the</span> Date
				</p>
				<h1 class="mt-4 sm:mt-6 text-4xl sm:text-5xl md:text-6xl lg:text-7xl tracking-wide font-imperial fade-in-name">
					Chelsea &amp; Maximiliano
				</h1>
				<br/>
				<p class="text-sm sm:text-base md:text-lg lg:text-xl tracking-[0.15em] font-formal fade-in-date">
					Diciembre 05, 2026
				</p>
			</div>


		</main>

	</body>
</html>
